<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire Bootstrap</title>
    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">
</head>
<body>
<div class="container mt-4">
<fieldset class="border border-success p-4 mb-4 rounded">

 <legend class="w-auto px-2 text-success">Informations personnelles</legend>
  <div class="mb-3">
<label class="form-label">Nom:</label>
<input type="text" class="form-control">
    </div>
        <div class="mb-3">
            <label class="form-label">Prénom:</label>
            <input type="text" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Pays:</label>
            <select class="form-select">
                <option selected>-- Sélectionnez --</option>
                <option>Maroc</option>
                <option>France</option>
                <option>Japon</option>
                <option>Canada</option>
                <option>Mozambique</option>

            </select>

        </div>

    </fieldset>
<fieldset class="border border-success p-4 mb-4 rounded">
    <legend class="w-auto px-2 text-success">Mangas préférés</legend>
     <div class="form-check">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">Conan</label>
</div>
<div class="form-check">
            <input class="form-check-input"  type="checkbox">
            <label class="form-check-label">Yu-Gi-Oh!</label>
</div>
<div class="form-check">
            <input class="form-check-input" type="checkbox">
            <label class="form-check-label">Bleach</label>
</div>
<div class="form-check">
            <input class="form-check-input" type="checkbox">
            <label class="form-check-label"> Hunter x Hunter</label>
</div>
<div class="form-check">
            <input class="form-check-input" type="checkbox">
            <label class="form-check-label">Death Note</label>
</div>
</fieldset>
    <fieldset class="border border-success p-4 mb-4 rounded">
        <legend class="w-auto px-2 text-success">Note du site</legend>
        <div class="d-flex gap-3">
        <div class="form-check">
            <input class="form-check-input" type="radio" name="note">
        <label class="form-check-label">1</label>
     </div>
    <div class="form-check">
    <input class="form-check-input" type="radio" name="note">
    <label class="form-check-label">2</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="note">
                <label class="form-check-label">3</label>
            </div>
    <div class="form-check">
        <input class="form-check-input" type="radio" name="note">
        <label class="form-check-label">4</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="note">
                <label class="form-check-label">5</label>
    </div>
    </div>
    </fieldset>
    <fieldset class="border border-success p-4 mb-4 rounded">
        <legend class="w-auto px-2 text-success">Votre avis</legend>
    <div class="mb-3">
    <label class="form-label"> Message:</label>
    <textarea class="form-control" rows="4" placeholder="Votre avis nous intéresse"></textarea>
    </div>
    </fieldset>
    <button class="btn btn-success">Envoyer</button>
    <button class="btn btn-outline-success">Réinitialiser</button>
</div>
</body>
</html>
